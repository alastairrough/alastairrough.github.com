<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Animal Noises</title>
    <style media="screen">
      img {
        display: block;
        width: 300px;
        margin-bottom: 1em;
      }
    </style>
</head>
<body>
  <script type="text/javascript">
    var animals = [
      'bullfrog',
      'camel',
      'cat',
      'chickadee',
      'crow',
      'cuckoo',
      'donkey',
      'goat',
      'panda',
      'peacock',
      'pig',
      'puffin',
      'rattlesnake',
      'turkey',
      'monkey',
      'monkeys',
      'cow',
      'bull',
      'rooster',
      'duck',
      'polarbear',
      'bear',
      'elephant',
      'lion',
      'tiger'
    ];

    var player = document.createElement('audio');
    player.id = 'player';
    var source = document.createElement('source');
    source.type = "audio/mp3";
    player.appendChild(source);
    document.body.appendChild(player);

    function initAnimal(name) {
      var image = document.createElement('img');
      image.src = 'content/' + name + '.jpg';
      document.body.appendChild(image);
      image.addEventListener('click', function (event) {
        player.pause();
        player.src = 'content/' + name + '.mp3';
        player.play();
      });
    }

    for (var i = 0; i < animals.length; i++) {
      initAnimal(animals[i]);
    };
  </script>
</body>
</html>
