<body>
   <div class="thumbnail" id="animalnoises1">
        <a class="playback" href="#">
            <img id="play1" src="http://aroughazure3.azurewebsites.net/content/cow.jpg" width="300" />
        </a>
        <audio id="animalnoises1">
            <source src="http://aroughazure3.azurewebsites.net/content/103425__confusion-music__bull-3-b.mp3" type='audio/mp3'>
        </audio>
    </div>
    <script type="text/javascript">
        $(function () {
            $(".playback").click(function (e) {
                e.preventDefault();
                // This next line will get the audio element
                // that is adjacent to the link that was clicked.
                var song = $(this).next('audio').get(0);
                if (song.paused)
                    song.play();
                else
                    song.pause();
            });
        });
    </script>
    <script type="text/javascript">
        window.addEvent('load', function () {
            loadResult();
        });
    </script>
